services:
  lightningcounter:
    image: ghcr.io/sembauke/lightning-counter:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - /volume1/docker/lightning-counter-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
